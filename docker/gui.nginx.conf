server {
    listen       8080;
    server_tokens off;

    # Docker's embedded DNS. Using a variable in proxy_pass forces nginx to
    # resolve at request time instead of once at startup — otherwise restarting
    # an upstream container (new IP) makes nginx return 502 forever.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Streaming uploads of large files: no body size limit, no request buffering.
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_http_version 1.1;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # APIs ------------------------------------------------------------------
    location /api-private/upload-module/ {
        set $upstream_upload upload-api:8080;
        proxy_pass http://$upstream_upload;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api-private/confirmation-module/ {
        set $upstream_upload upload-api:8080;
        proxy_pass http://$upstream_upload;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api-private/download-module/ {
        set $upstream_download download-api:8081;
        proxy_pass http://$upstream_download;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Safety net: any /api-private/* not matched by a specific location above
    # is a misconfiguration (e.g. a route renamed in the front but not here).
    # Fail loudly instead of falling through to the SPA fallback (200 + HTML),
    # which would silently respond as a successful API response.
    location /api-private/ {
        return 502 "no proxy_pass route for $uri — check docker/gui.nginx.conf\n";
        add_header Content-Type text/plain always;
    }

    # Static GUI ------------------------------------------------------------
    location / {
        root   /app;
        try_files $uri $uri/ /index.html;
    }
}
