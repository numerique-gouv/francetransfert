name: Generic Front build
on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      tag:
        required: true
        type: string
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
      - name: Login to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: ${{ inputs.project }}
          push: true
          tags: |
            lasuite/${{ inputs.project }}:${{ inputs.tag }}
            lasuite/${{ inputs.project }}:${{ github.ref_name }}
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2
      - name: Wait before signing image
        run: sleep 30
      - name: Sign image
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_SECRET }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes --key env://COSIGN_KEY "docker.io/lasuite/${{ inputs.project }}@${{ steps.build.outputs.digest }}"
