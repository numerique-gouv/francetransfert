name: Generic Front build
on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      tag:
        required: true
        type: string
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        if: github.ref_name == 'main' || github.ref_name == 'ppr'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build (and push on main/ppr)
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.project }}
          push: ${{ github.ref_name == 'main' || github.ref_name == 'ppr' }}
          tags: |
            lasuite/${{ inputs.project }}:${{ inputs.tag }}
            ${{ (github.ref_name == 'main' || github.ref_name == 'ppr')
                && format('lasuite/{0}:{1}', inputs.project, github.ref_name)
                || '' }}
